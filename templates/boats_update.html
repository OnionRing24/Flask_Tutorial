<style>
    .body{
        margin: auto;
    }
    .input_field {
      width: 100%;
      padding: 12px 20px;
      margin: 8px 0;
      display: inline-block;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .input_submit {
      width: 100%;
      background-color: #4CAF50;
      color: white;
      padding: 14px 20px;
      margin: 8px 0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .input_submit:hover {
      background-color: #45a049;
    }
</style>

{% extends "base.html" %}
{% block body %}
    <div class="body">
        {% if error %}
            <h2>{{ error }}</h2>
        {% endif %}

        {% if success %}
            <h2>{{ success }}</h2>
        {% endif %}

        {% if boat %}
            <form action="/update/{{ boat['id'] }}" method="POST">
                <input type="number" name="id" value="{{ boat['id'] }}" class="input_field" readonly> <br>
                <input type="text" name="name" value="{{ boat['name'] }}" placeholder="Boat name" class="input_field"> <br>
                <input type="text" name="type" value="{{ boat['type'] }}" placeholder="Boat type" class="input_field"> <br>
                <input type="number" name="owner_id" value="{{ boat['owner_id'] }}" placeholder="Owner ID" class="input_field"> <br>
                <input type="number" name="rental_price" value="{{ boat['rental_price'] }}" placeholder="Rental price" class="input_field" step="0.01"> <br>
                <input type="submit" value="Update" class="input_submit">
            </form>
        {% endif %}
    </div>
{% endblock %}
